<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koosoleku Aegade Küsitlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        #loader { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #475569; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root">
        <div id="loader">Laen rakendust...</div>
    </div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useMemo, useEffect, useRef } = React;

        // --- FIREBASE SEADISTUS ---
        let app, auth, db;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (e) { console.error("Firebase init viga", e); }
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'koosolek-app';

        const THEMES = [
          { header: "bg-blue-100 text-blue-800 border-blue-200", subHeader: "bg-blue-50 text-blue-700 border-blue-200", cellSelected: "bg-blue-500 text-white", cellHover: "hover:bg-blue-100", bestTime: "bg-blue-600 text-white border-t-blue-700" },
          { header: "bg-amber-100 text-amber-900 border-amber-200", subHeader: "bg-amber-50 text-amber-800 border-amber-200", cellSelected: "bg-amber-500 text-white", cellHover: "hover:bg-amber-100", bestTime: "bg-amber-600 text-white border-t-amber-700" },
          { header: "bg-purple-100 text-purple-800 border-purple-200", subHeader: "bg-purple-50 text-purple-700 border-purple-200", cellSelected: "bg-purple-500 text-white", cellHover: "hover:bg-purple-100", bestTime: "bg-purple-600 text-white border-t-purple-700" },
          { header: "bg-emerald-100 text-emerald-800 border-emerald-200", subHeader: "bg-emerald-50 text-emerald-700 border-emerald-200", cellSelected: "bg-emerald-500 text-white", cellHover: "hover:bg-emerald-100", bestTime: "bg-emerald-600 text-white border-t-emerald-700" }
        ];

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const icons = {
                Check: <polyline points="20 6 9 17 4 12" strokeWidth="3" />,
                CalendarDays: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>,
                Users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>,
                Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06-.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
                Trash2: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                Edit: <><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" /></>,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        }

        const EST_WEEKDAYS = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];

        function App() {
          const [user, setUser] = useState(null);
          const [loadingData, setLoadingData] = useState(true);
          const [names, setNames] = useState(["Meelis Külaots", "Ehtel Kuldvere-Vent", "Lea Kurvits", "Jane Loidap", "Peeter-Toomas Tael", "Mari-Liis Vanaisak", "Merilin Seer", "Kaie Tali", "Merike Allik", "Kaja Udso"]);
          const [dates, setDates] = useState([
            { id: 'd1', label: '10.03 (Teisipäev)', times: ['14:00', '15:00', '16:00', '17:00', '18:00'] },
            { id: 'd2', label: '12.03 (Neljapäev)', times: ['14:00', '15:00', '16:00', '17:00', '18:00'] }
          ]);
          const [selections, setSelections] = useState({});
          const [googleSheetUrl, setGoogleSheetUrl] = useState("https://script.google.com/macros/s/AKfycbwndnRNuDbWxvq15bxkQymReXD1yU8nu7opxwGseQZNkDsv5sCQXxrWQUrlDwN4pAguvQ/exec");
          const [isEditMode, setIsEditMode] = useState(false);
          const [newName, setNewName] = useState("");
          const [newTimes, setNewTimes] = useState({});
          const [activeEdit, setActiveEdit] = useState(null);
          const isInitialMount = useRef(true);

          useEffect(() => {
            if (!auth) { setLoadingData(false); return; }
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else { await signInAnonymously(auth); }
              } catch (error) { console.error("Auth error", error); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
                setUser(u);
                if (!u) setLoadingData(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            const loadData = async () => {
                if (typeof __firebase_config !== 'undefined' && user && db) {
                    const pollDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'poll_data', 'main_poll');
                    onSnapshot(pollDocRef, (docSnap) => {
                      if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.names) setNames(data.names);
                        if (data.dates) setDates(data.dates);
                        if (data.selections) setSelections(data.selections);
                      }
                      setLoadingData(false);
                    }, () => setLoadingData(false));
                } else {
                    // GITHUB MODE
                    const savedData = localStorage.getItem('koosolek_data');
                    if (savedData) {
                        try {
                            const parsed = JSON.parse(savedData);
                            if (parsed.names) setNames(parsed.names);
                            if (parsed.dates) setDates(parsed.dates);
                            if (parsed.selections) setSelections(parsed.selections);
                        } catch (e) {}
                    }
                    
                    if (googleSheetUrl) {
                        try {
                            const res = await fetch(googleSheetUrl, { method: 'GET', mode: 'cors' }).catch(() => null);
                            if (res && res.ok) {
                                const data = await res.json();
                                if (data && data.names) {
                                    setNames(data.names); setDates(data.dates); setSelections(data.selections);
                                }
                            }
                        } catch (err) {}
                    }
                    setLoadingData(false);
                }
            };
            loadData();
          }, [user]);

          const saveToFirebase = async (newNames, newDates, newSelections) => {
            localStorage.setItem('koosolek_data', JSON.stringify({ names: newNames, dates: newDates, selections: newSelections }));
            if (typeof __firebase_config !== 'undefined' && user && db) {
                try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'poll_data', 'main_poll'), { names: newNames, dates: newDates, selections: newSelections, googleSheetUrl }); } catch (err) {}
            }
          };

          const toggleSelection = (name, dateLabel, time) => {
            if (isEditMode || activeEdit) return;
            const key = `${name}@@${dateLabel}@@${time}`;
            const newSelections = { ...selections, [key]: !selections[key] };
            setSelections(newSelections);
            saveToFirebase(names, dates, newSelections);
          };

          const handleUpdateDate = (dateId, newLabel) => {
            let oldLabel = "";
            const newDates = dates.map(d => {
              if (d.id === dateId) { oldLabel = d.label; return { ...d, label: newLabel }; }
              return d;
            });
            const newSelections = { ...selections };
            if (oldLabel && oldLabel !== newLabel) {
              Object.keys(newSelections).forEach(key => {
                const parts = key.split("@@");
                if (parts.length === 3 && parts[1] === oldLabel) { 
                  const val = newSelections[key]; 
                  delete newSelections[key]; 
                  newSelections[`${parts[0]}@@${newLabel}@@${parts[2]}`] = val; 
                }
              });
            }
            setDates(newDates); setSelections(newSelections); saveToFirebase(names, newDates, newSelections);
            setActiveEdit(null);
          };

          const handleUpdateTime = (dateId, oldTime, newTime) => {
            if (oldTime === newTime) { setActiveEdit(null); return; }
            let dateLabel = "";
            const newDates = dates.map(d => {
              if (d.id === dateId) { 
                dateLabel = d.label; 
                let ut = d.times.filter(t => t !== oldTime); 
                if (!ut.includes(newTime)) ut.push(newTime); 
                ut.sort(); 
                return { ...d, times: ut }; 
              }
              return d;
            });

            const newSelections = { ...selections };
            if (dateLabel) {
              Object.keys(newSelections).forEach(key => {
                const parts = key.split("@@");
                if (parts.length === 3 && parts[1] === dateLabel && parts[2] === oldTime) { 
                  const val = newSelections[key]; 
                  delete newSelections[key]; 
                  newSelections[`${parts[0]}@@${dateLabel}@@${newTime}`] = val; 
                }
              });
            }
            setDates(newDates); setSelections(newSelections); saveToFirebase(names, newDates, newSelections);
            setActiveEdit(null);
          };

          const addName = () => { 
            const trimmed = newName.trim();
            if (trimmed && !names.includes(trimmed)) { 
                const newNames = [...names, trimmed];
                setNames(newNames); saveToFirebase(newNames, dates, selections); setNewName(""); 
            }
          };
          const removeName = (n) => { const nn = names.filter(x => x !== n); setNames(nn); saveToFirebase(nn, dates, selections); };
          const removeDate = (id) => { const nd = dates.filter(d => d.id !== id); setDates(nd); saveToFirebase(names, nd, selections); };
          
          const addDate = () => {
            const today = new Date();
            const label = `${String(today.getDate()).padStart(2, '0')}.${String(today.getMonth()+1).padStart(2, '0')} (${EST_WEEKDAYS[today.getDay()]})`;
            const lastTimes = dates.length > 0 ? [...dates[dates.length-1].times] : ['14:00', '15:00', '16:00', '17:00'];
            const newDates = [...dates, { id: `d${Date.now()}`, label: label, times: lastTimes }];
            setDates(newDates);
            saveToFirebase(names, newDates, selections);
          };

          const addTime = (id) => {
            const tt = newTimes[id];
            if (!tt) return;
            const nd = dates.map(d => (d.id === id && !d.times.includes(tt)) ? { ...d, times: [...d.times, tt].sort() } : d);
            setDates(nd); saveToFirebase(names, nd, selections); setNewTimes(p => ({ ...p, [id]: "" }));
          };
          const removeTime = (id, t) => { const nd = dates.map(d => d.id === id ? { ...d, times: d.times.filter(x => x !== t) } : d); setDates(nd); saveToFirebase(names, nd, selections); };

          const totals = useMemo(() => {
            const c = {};
            dates.forEach(d => d.times.forEach(t => {
                const key = `${d.label}@@${t}`;
                c[key] = names.reduce((sum, name) => sum + (selections[`${name}@@${d.label}@@${t}`] ? 1 : 0), 0);
            }));
            return c;
          }, [selections, dates, names]);

          const maxTotal = Math.max(...Object.values(totals), 0);
          const [isSyncing, setIsSyncing] = useState(false);
          
          useEffect(() => {
            if (isInitialMount.current) { isInitialMount.current = false; return; }
            if (!googleSheetUrl || loadingData) return;
            setIsSyncing(true);
            const tid = setTimeout(() => {
              fetch(googleSheetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ names, dates, selections, totals }) })
                .then(() => setTimeout(() => setIsSyncing(false), 1000)).catch(() => setIsSyncing(false));
            }, 1500); 
            return () => clearTimeout(tid);
          }, [selections, names, dates]);

          const EditOverlay = () => {
            if (!activeEdit) return null;
            const hourParts = activeEdit.val.includes(':') ? activeEdit.val.split(':') : ["12", "00"];
            const [hour, setHour] = useState(hourParts[0]);
            const [min, setMin] = useState(hourParts[1]);
            const dayParts = activeEdit.val.match(/^(\d{2})\.(\d{2})/) || ["10.03", "10", "03"];
            const [dVal, setDVal] = useState(dayParts[1]);
            const [mVal, setMVal] = useState(dayParts[2]);

            const save = () => {
              if (activeEdit.type === 'time') {
                handleUpdateTime(activeEdit.dateId, activeEdit.val, `${hour}:${min}`);
              } else {
                const year = new Date().getFullYear();
                const dObj = new Date(year, parseInt(mVal)-1, parseInt(dVal));
                const newLabel = `${dVal}.${mVal} (${EST_WEEKDAYS[dObj.getDay()]})`;
                handleUpdateDate(activeEdit.dateId, newLabel);
              }
            };

            return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xs overflow-hidden border border-slate-200">
                  <div className="bg-slate-800 p-4 text-white flex justify-between items-center">
                    <h3 className="font-bold">{activeEdit.type === 'time' ? 'Muuda kellaaega' : 'Muuda kuupäeva'}</h3>
                    <button onClick={() => setActiveEdit(null)} className="hover:opacity-70"><Icon name="X" size={20} /></button>
                  </div>
                  <div className="p-6 space-y-6">
                    {activeEdit.type === 'time' ? (
                      <div className="flex items-center justify-center gap-4 font-mono">
                        <select value={hour} onChange={(e) => setHour(e.target.value)} className="bg-slate-100 rounded-lg p-2 text-xl font-bold w-16 text-center outline-none ring-2 ring-transparent focus:ring-slate-400">
                          {Array.from({length: 24}).map((_, i) => <option key={i} value={String(i).padStart(2, '0')}>{String(i).padStart(2, '0')}</option>)}
                        </select>
                        <span className="text-2xl font-bold text-slate-300">:</span>
                        <select value={min} onChange={(e) => setMin(e.target.value)} className="bg-slate-100 rounded-lg p-2 text-xl font-bold w-16 text-center outline-none ring-2 ring-transparent focus:ring-slate-400">
                          {['00','05','10','15','20','25','30','35','40','45','50','55'].map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                      </div>
                    ) : (
                      <div className="flex items-center justify-center gap-4">
                        <select value={dVal} onChange={(e) => setDVal(e.target.value)} className="bg-slate-100 rounded-lg p-2 text-xl font-bold w-16 text-center outline-none ring-2 ring-transparent focus:ring-slate-400">
                          {Array.from({length: 31}).map((_, i) => <option key={i+1} value={String(i+1).padStart(2, '0')}>{i+1}</option>)}
                        </select>
                        <span className="text-xl font-bold text-slate-300">.</span>
                        <select value={mVal} onChange={(e) => setMVal(e.target.value)} className="bg-slate-100 rounded-lg p-2 text-xl font-bold w-16 text-center outline-none ring-2 ring-transparent focus:ring-slate-400">
                          {Array.from({length: 12}).map((_, i) => <option key={i+1} value={String(i+1).padStart(2, '0')}>{i+1}</option>)}
                        </select>
                      </div>
                    )}
                    <button onClick={save} className="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-colors flex items-center justify-center gap-2">
                      <Icon name="Save" size={20} /> Salvesta
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          if (loadingData) return <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4"><div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div><h2 className="text-xl font-semibold text-slate-700">Laen andmeid...</h2></div>;

          return (
            <div className="min-h-screen bg-slate-100 py-8 px-4 sm:px-6 lg:px-8 font-sans">
              <EditOverlay />
              <div className="max-w-6xl mx-auto space-y-6">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                  <div className="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4">
                    <div>
                      <h1 className="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3"><Icon name="CalendarDays" className="text-emerald-600" size={32} />Koosoleku aja valimine</h1>
                      <p className="mt-2 text-slate-600">Elva Valla Rahvakultuuri Koostöögrupp</p>
                    </div>
                    <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                      <div className="flex items-center gap-2 bg-slate-100 text-slate-700 px-4 py-2 rounded-lg font-medium"><Icon name="Users" size={20} /><span>{names.length} liiget</span></div>
                      {googleSheetUrl && (
                        <div className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${isSyncing ? 'bg-blue-100 text-blue-700' : 'bg-emerald-50 text-emerald-700'}`}>
                          {isSyncing ? <div className="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div> : <Icon name="Check" size={18} />}
                          {isSyncing ? 'Salvestan...' : 'Sünkroniseeritud'}
                        </div>
                      )}
                      <button onClick={() => setIsEditMode(!isEditMode)} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${isEditMode ? 'bg-rose-100 text-rose-700 hover:bg-rose-200' : 'bg-slate-800 text-white hover:bg-slate-700'}`}><Icon name={isEditMode ? 'X' : 'Settings'} size={20} />{isEditMode ? 'Sulge' : 'Muuda'}</button>
                    </div>
                  </div>
                </div>

                {isEditMode && (
                  <div className="bg-white rounded-2xl shadow-sm border-2 border-slate-800 p-6 sm:p-8 animate-in slide-in-from-top duration-300">
                    <h2 className="text-xl font-bold text-slate-800 mb-6 border-b pb-2">Seaded</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div className="space-y-4">
                        <h3 className="font-semibold text-slate-700 flex items-center gap-2"><Icon name="Users" size={18} /> Osalejad</h3>
                        <div className="flex gap-2">
                          <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addName()} placeholder="Uue osaleja nimi..." className="flex-1 px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-slate-400" />
                          <button onClick={addName} className="bg-slate-800 text-white p-2 rounded-lg hover:bg-slate-700 transition-colors"><Icon name="Plus" size={20} /></button>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-2 max-h-64 overflow-y-auto space-y-1 custom-scrollbar">
                          {names.map(name => (
                            <div key={name} className="flex justify-between items-center bg-white border border-slate-200 p-2 rounded shadow-sm">
                              <span className="text-sm font-medium">{name}</span>
                              <button onClick={() => removeName(name)} className="text-rose-500 hover:bg-rose-50 p-1 rounded transition-colors"><Icon name="Trash2" size={16} /></button>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="space-y-4">
                        <h3 className="font-semibold text-slate-700 flex items-center gap-2"><Icon name="CalendarDays" size={18} /> Kuupäevade lisamine</h3>
                        <button onClick={addDate} className="w-full py-2 bg-emerald-600 text-white rounded-lg font-bold flex items-center justify-center gap-2 shadow hover:bg-emerald-700 transition-colors">
                          <Icon name="Plus" size={20} strokeWidth={3} /> Lisa uus kuupäev
                        </button>
                        <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-1">
                          {dates.map((d, index) => {
                            const theme = THEMES[index % THEMES.length];
                            return (
                              <div key={d.id} className={`border rounded-lg overflow-hidden`}>
                                <div className={`flex justify-between items-center p-3 ${theme.header}`}>
                                  <span className="font-semibold">{d.label}</span>
                                  <button onClick={() => removeDate(d.id)} className="text-slate-700 hover:text-rose-600 transition-colors"><Icon name="Trash2" size={18} /></button>
                                </div>
                                <div className="p-3 bg-white space-y-2">
                                  <div className="flex flex-wrap gap-2">{d.times.map(t => (<div key={t} className={`flex items-center gap-1 text-sm border px-2 py-1 rounded-md ${theme.subHeader}`}><span>{t}</span><button onClick={() => removeTime(d.id, t)} className="text-slate-500 hover:text-rose-500 transition-colors"><Icon name="X" size={14} /></button></div>))}</div>
                                  <div className="flex gap-2 mt-2 pt-2 border-t border-slate-100">
                                    <input type="text" value={newTimes[d.id] || ""} onChange={(e) => setNewTimes({...newTimes, [d.id]: e.target.value})} placeholder="nt 18:30" className="text-sm flex-1 px-2 py-1 border border-slate-300 rounded outline-none focus:ring-1 focus:ring-slate-400" />
                                    <button onClick={() => addTime(d.id)} className="bg-slate-200 text-slate-700 px-2 rounded text-sm font-medium hover:bg-slate-300 transition-colors">Lisa</button>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-opacity ${isEditMode ? 'opacity-50 pointer-events-none' : ''}`}>
                  <div className="overflow-x-auto">
                    {dates.length === 0 ? (
                      <div className="p-12 text-center text-slate-500 italic">Tabel on tühi. Vajuta "Muuda" andmete lisamiseks.</div>
                    ) : (
                      <table className="min-w-full border-collapse text-sm">
                        <thead>
                          <tr>
                            <th className="sticky left-0 z-20 bg-white border-b border-r border-slate-200 p-4 min-w-[180px] shadow-[1px_0_0_0_#e2e8f0]"></th>
                            {dates.map((d, i) => {
                              if (d.times.length === 0) return null;
                              return (
                                <th key={d.id} colSpan={d.times.length} className={`border-b border-r p-3 text-center font-bold text-base ${THEMES[i % THEMES.length].header}`}>
                                  <div className="flex items-center justify-center gap-2">
                                    <span className="whitespace-nowrap">{d.label}</span>
                                    <button onClick={() => setActiveEdit({ type: 'date', dateId: d.id, val: d.label })} className="flex items-center justify-center w-7 h-7 bg-white/50 rounded-md hover:bg-white transition-colors text-slate-700"><Icon name="Edit" size={14} /></button>
                                  </div>
                                </th>
                              );
                            })}
                          </tr>
                          <tr>
                            <th className="sticky left-0 z-20 bg-slate-50 border-b border-r border-slate-200 p-3 text-left font-bold text-slate-700 shadow-[1px_0_0_0_#e2e8f0]">Osaleja Nimi</th>
                            {dates.map((d, i) => {
                              if (d.times.length === 0) return null;
                              return d.times.map(t => (
                                <th key={`${d.id}_${t}`} className={`border-b border-r border-slate-200/50 p-2 text-center font-semibold ${THEMES[i % THEMES.length].subHeader} min-w-[90px]`}>
                                  <div className="flex flex-col items-center justify-center gap-1">
                                    <span className="leading-tight">{t}</span>
                                    <button onClick={() => setActiveEdit({ type: 'time', dateId: d.id, val: t })} className="flex items-center justify-center w-6 h-6 bg-black/5 rounded-md hover:bg-black/10 transition-colors text-slate-600"><Icon name="Edit" size={12} /></button>
                                  </div>
                                </th>
                              ));
                            })}
                          </tr>
                        </thead>
                        <tbody>
                          {names.map((name) => (
                            <tr key={name} className="group hover:bg-slate-50 transition-colors">
                              <td className="sticky left-0 z-10 bg-white group-hover:bg-slate-50 border-b border-r border-slate-200 p-3 font-medium text-slate-800 shadow-[1px_0_0_0_#e2e8f0]">{name}</td>
                              {dates.map((d, i) => {
                                if (d.times.length === 0) return null;
                                const theme = THEMES[i % THEMES.length];
                                return d.times.map(t => {
                                  const selKey = `${name}@@${d.label}@@${t}`;
                                  const isSelected = selections[selKey];
                                  return (
                                    <td key={selKey} onClick={() => toggleSelection(name, d.label, t)} className={`border-b border-r border-slate-200 p-0 cursor-pointer transition-all duration-150 ${isSelected ? theme.cellSelected : `bg-transparent ${theme.cellHover}`}`}>
                                      <div className="flex items-center justify-center h-12 w-full">{isSelected && <Icon name="Check" size={24} strokeWidth={3} />}</div>
                                    </td>
                                  );
                                });
                              })}
                            </tr>
                          ))}
                        </tbody>
                        {names.length > 0 && (
                          <tfoot>
                            <tr className="bg-slate-100">
                              <td className="sticky left-0 z-20 bg-slate-100 border-t-4 border-slate-300 border-r border-slate-200 p-4 font-bold text-slate-800 text-right shadow-[1px_0_0_0_#e2e8f0]">KOKKU:</td>
                              {dates.map((d, i) => {
                                if (d.times.length === 0) return null;
                                const theme = THEMES[i % THEMES.length];
                                return d.times.map(t => {
                                  const total = totals[`${d.label}@@${t}`] || 0;
                                  const isBestTime = total > 0 && total === maxTotal;
                                  return <td key={`${d.label}@@${t}`} className={`border-t-4 border-r border-slate-300 p-3 text-center font-bold text-lg transition-colors ${isBestTime ? theme.bestTime : 'text-slate-600'}`}>{total}{isBestTime && <div className="text-[10px] font-normal uppercase opacity-90 mt-1">Sobivaim</div>}</td>;
                                });
                              })}
                            </tr>
                          </tfoot>
                        )}
                      </table>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
