<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koosoleku Aegade Küsitlus</title>
    <!-- Tailwind CSS kujunduse jaoks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React.js -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (et brauser mõistaks Reacti koodi) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Lihtne laadimisekraan alglaadimiseks */
        #loader { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #475569; }
        /* Peidame kellaikooni osades brauserites, et disain oleks puhtam */
        input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root">
        <div id="loader">Laen rakendust...</div>
    </div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useMemo, useEffect, useRef } = React;

        // --- PILVESALVESTUSE (FIREBASE) SEADISTUS ---
        let app, auth, db;
        if (typeof __firebase_config !== 'undefined') {
            const firebaseConfig = JSON.parse(__firebase_config);
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } else {
            console.warn("Pilve võtmeid ei leitud! Töötab lokaalses GitHubi režiimis.");
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'koosolek-app';

        // Värviteemad erinevatele päevadele
        const THEMES = [
          { header: "bg-blue-100 text-blue-800 border-blue-200", subHeader: "bg-blue-50 text-blue-700 border-blue-200", cellSelected: "bg-blue-500 text-white", cellHover: "hover:bg-blue-100", bestTime: "bg-blue-600 text-white border-t-blue-700" },
          { header: "bg-amber-100 text-amber-900 border-amber-200", subHeader: "bg-amber-50 text-amber-800 border-amber-200", cellSelected: "bg-amber-500 text-white", cellHover: "hover:bg-amber-100", bestTime: "bg-amber-600 text-white border-t-amber-700" },
          { header: "bg-purple-100 text-purple-800 border-purple-200", subHeader: "bg-purple-50 text-purple-700 border-purple-200", cellSelected: "bg-purple-500 text-white", cellHover: "hover:bg-purple-100", bestTime: "bg-purple-600 text-white border-t-purple-700" },
          { header: "bg-emerald-100 text-emerald-800 border-emerald-200", subHeader: "bg-emerald-50 text-emerald-700 border-emerald-200", cellSelected: "bg-emerald-500 text-white", cellHover: "hover:bg-emerald-100", bestTime: "bg-emerald-600 text-white border-t-emerald-700" }
        ];

        // Ikoonide abikomponent
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const icons = {
                Check: <polyline points="20 6 9 17 4 12" />,
                CalendarDays: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>,
                Users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>,
                Settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></>,
                Plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
                Trash2: <><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>,
                X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
                Edit: <><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        }

        const formatEstonianDate = (dateString) => {
            if (!dateString) return "";
            const d = new Date(dateString);
            const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
            const dayName = days[d.getDay()];
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}.${month} (${dayName})`;
        };

        function App() {
          const [user, setUser] = useState(null);
          const [loadingData, setLoadingData] = useState(true);

          const defaultNames = ["Meelis Külaots", "Ehtel Kuldvere-Vent", "Lea Kurvits", "Jane Loidap", "Peeter-Toomas Tael", "Mari-Liis Vanaisak", "Merilin Seer", "Kaie Tali", "Merike Allik", "Kaja Udso"];
          const defaultDates = [
            { id: 'd1', label: '10.03 (Teisipäev)', times: ['14:00', '15:00', '16:00', '17:00', '18:00'] },
            { id: 'd2', label: '12.03 (Neljapäev)', times: ['14:00', '15:00', '16:00', '17:00', '18:00'] }
          ];

          const [names, setNames] = useState(defaultNames);
          const [dates, setDates] = useState(defaultDates);
          const [selections, setSelections] = useState({});
          
          const [googleSheetUrl, setGoogleSheetUrl] = useState("https://script.google.com/macros/s/AKfycbwndnRNuDbWxvq15bxkQymReXD1yU8nu7opxwGseQZNkDsv5sCQXxrWQUrlDwN4pAguvQ/exec");
          
          const [isEditMode, setIsEditMode] = useState(false);
          const [newName, setNewName] = useState("");
          const [newDate, setNewDate] = useState("");
          const [newTimes, setNewTimes] = useState({});

          const isInitialMount = useRef(true);

          // 1. Samm: Autentimine (Töötab Canvasel)
          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {}
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
            });
            return () => unsubscribe();
          }, []);

          // 2. Samm: Andmete laadimine
          useEffect(() => {
            if (typeof __firebase_config !== 'undefined') {
                // CANVAS REŽIIM (Kasutab Firebase'i)
                if (!user || !db) return;
                const pollDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'poll_data', 'main_poll');
                const unsubscribe = onSnapshot(pollDocRef, (docSnap) => {
                  if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.names && data.names.length > 0) setNames(data.names);
                    if (data.dates && data.dates.length > 0) setDates(data.dates);
                    if (data.selections) setSelections(data.selections);
                    if (data.googleSheetUrl !== undefined) setGoogleSheetUrl(data.googleSheetUrl);
                  }
                  setLoadingData(false);
                }, () => setLoadingData(false));
                return () => unsubscribe();
            } else {
                // GITHUB REŽIIM
                const loadData = async () => {
                    // Esmalt laeme brauseri lokaalsest mälust
                    const savedData = localStorage.getItem('koosolek_data');
                    if (savedData) {
                        try {
                            const parsed = JSON.parse(savedData);
                            if (parsed.names && parsed.names.length > 0) setNames(parsed.names);
                            if (parsed.dates && parsed.dates.length > 0) setDates(parsed.dates);
                            if (parsed.selections) setSelections(parsed.selections);
                        } catch (e) {}
                    }

                    // Seejärel proovime andmeid lugeda Google Sheetsist (et näha teiste uusi valikuid)
                    if (googleSheetUrl) {
                        try {
                            const res = await fetch(googleSheetUrl);
                            const data = await res.json();
                            if (data && data.names && data.names.length > 0) {
                                setNames(data.names);
                                setDates(data.dates);
                                setSelections(data.selections);
                                localStorage.setItem('koosolek_data', JSON.stringify(data));
                            }
                        } catch (err) {
                            console.warn("Ei saanud Sheetsist andmeid alla laadida.", err);
                        }
                    }
                    setLoadingData(false);
                };
                loadData();
            }
          }, [user]); // googleSheetUrl muutus siin teadlikult eemaldatud, et mitte lõputult lehte laadida

          const saveToFirebase = async (newNames, newDates, newSelections, newUrl = googleSheetUrl) => {
            // UUS: Salvestame alati kohalikku mällu, et leht mäletaks seisu koheselt
            localStorage.setItem('koosolek_data', JSON.stringify({
                names: newNames, dates: newDates, selections: newSelections
            }));

            // Kui oleme Canvasel, salvestame ka Firebase'i
            if (typeof __firebase_config !== 'undefined' && user && db) {
                try {
                    const pollDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'poll_data', 'main_poll');
                    await setDoc(pollDocRef, {
                        names: newNames, dates: newDates, selections: newSelections, googleSheetUrl: newUrl
                    });
                } catch (err) {}
            }
          };

          const saveUrl = (url) => {
            setGoogleSheetUrl(url);
            saveToFirebase(names, dates, selections, url);
          };

          const toggleSelection = (name, dateLabel, time) => {
            if (isEditMode) return;
            const key = `${name}@@${dateLabel}@@${time}`;
            const newSelections = { ...selections, [key]: !selections[key] };
            setSelections(newSelections);
            saveToFirebase(names, dates, newSelections);
          };

          const addName = () => { 
            const trimmed = newName.trim();
            if (trimmed && !names.includes(trimmed)) { 
                const newNames = [...names, trimmed];
                setNames(newNames); 
                saveToFirebase(newNames, dates, selections);
                setNewName(""); 
            } 
          };
          
          const removeName = (nameToRemove) => { 
              const newNames = names.filter(n => n !== nameToRemove);
              setNames(newNames); 
              saveToFirebase(newNames, dates, selections);
          };
          
          const addDate = () => { 
            if (newDate) { 
                const formattedLabel = formatEstonianDate(newDate);
                const newDates = [...dates, { id: `d${Date.now()}`, label: formattedLabel, times: [] }];
                setDates(newDates); 
                saveToFirebase(names, newDates, selections);
                setNewDate(""); 
            } 
          };
          
          const removeDate = (idToRemove) => { 
              const newDates = dates.filter(d => d.id !== idToRemove);
              setDates(newDates); 
              saveToFirebase(names, newDates, selections);
          };
          
          const addTime = (dateId) => {
            const timeToAdd = newTimes[dateId];
            if (timeToAdd) {
              const newDates = dates.map(d => {
                if (d.id === dateId && !d.times.includes(timeToAdd)) { 
                  return { ...d, times: [...d.times, timeToAdd].sort() }; 
                }
                return d;
              });
              setDates(newDates);
              saveToFirebase(names, newDates, selections);
              setNewTimes(prev => ({ ...prev, [dateId]: "" }));
            }
          };
          
          const removeTime = (dateId, timeToRemove) => {
            const newDates = dates.map(d => {
              if (d.id === dateId) { return { ...d, times: d.times.filter(t => t !== timeToRemove) }; }
              return d;
            });
            setDates(newDates);
            saveToFirebase(names, newDates, selections);
          };

          const updateDate = (dateId, newDateStr) => {
            if (!newDateStr) return;
            const formattedLabel = formatEstonianDate(newDateStr);
            let oldLabel = "";
            const newDates = dates.map(d => {
              if (d.id === dateId) {
                oldLabel = d.label;
                return { ...d, label: formattedLabel };
              }
              return d;
            });

            const newSelections = { ...selections };
            if (oldLabel && oldLabel !== formattedLabel) {
              Object.keys(newSelections).forEach(key => {
                const [name, dLabel, time] = key.split("@@");
                if (dLabel === oldLabel) {
                  const val = newSelections[key];
                  delete newSelections[key];
                  newSelections[`${name}@@${formattedLabel}@@${time}`] = val;
                }
              });
            }
            setDates(newDates);
            setSelections(newSelections);
            saveToFirebase(names, newDates, newSelections);
          };

          const updateTime = (dateId, oldTime, newTimeStr) => {
            if (!newTimeStr || oldTime === newTimeStr) return;
            let dateLabel = "";
            const newDates = dates.map(d => {
              if (d.id === dateId) {
                dateLabel = d.label;
                let updatedTimes = d.times.filter(t => t !== oldTime);
                if (!updatedTimes.includes(newTimeStr)) updatedTimes.push(newTimeStr);
                updatedTimes.sort();
                return { ...d, times: updatedTimes };
              }
              return d;
            });

            const newSelections = { ...selections };
            if (dateLabel) {
              Object.keys(newSelections).forEach(key => {
                const [name, dLabel, time] = key.split("@@");
                if (dLabel === dateLabel && time === oldTime) {
                  const val = newSelections[key];
                  delete newSelections[key];
                  newSelections[`${name}@@${dateLabel}@@${newTimeStr}`] = val;
                }
              });
            }
            setDates(newDates);
            setSelections(newSelections);
            saveToFirebase(names, newDates, newSelections);
          };

          const totals = useMemo(() => {
            const calcTotals = {};
            dates.forEach(d => {
              d.times.forEach(t => {
                const key = `${d.label}@@${t}`;
                calcTotals[key] = names.reduce((sum, name) => {
                  const selKey = `${name}@@${d.label}@@${t}`;
                  return sum + (selections[selKey] ? 1 : 0);
                }, 0);
              });
            });
            return calcTotals;
          }, [selections, dates, names]);

          const maxTotal = Math.max(...Object.values(totals), 0);

          // GOOGLE SHEETS AUTOMAATNE SÜNKRONISEERIMINE
          const [isSyncing, setIsSyncing] = useState(false);
          
          useEffect(() => {
            if (isInitialMount.current) {
              isInitialMount.current = false;
              return;
            }
            if (!googleSheetUrl || loadingData) return;

            setIsSyncing(true);
            
            const timeoutId = setTimeout(() => {
              fetch(googleSheetUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ names, dates, selections, totals })
              }).then(() => {
                setTimeout(() => setIsSyncing(false), 1000);
              }).catch(error => {
                console.error("Viga sünkroniseerimisel:", error);
                setIsSyncing(false);
              });
            }, 1500); 

            return () => clearTimeout(timeoutId);
          }, [selections, names, dates, googleSheetUrl]);

          if (loadingData) {
            return (
              <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
                <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <h2 className="text-xl font-semibold text-slate-700">Laen andmeid...</h2>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-100 py-8 px-4 sm:px-6 lg:px-8 font-sans">
              <div className="max-w-6xl mx-auto space-y-6">
                
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                  <div className="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4">
                    <div>
                      <h1 className="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                        <Icon name="CalendarDays" className="text-emerald-600" size={32} />
                        Koosoleku aja valimine
                      </h1>
                      <p className="mt-2 text-slate-600">Elva Valla Rahvakultuuri Koostöögrupp</p>
                    </div>
                    <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                      <div className="flex items-center gap-2 bg-slate-100 text-slate-700 px-4 py-2 rounded-lg font-medium">
                        <Icon name="Users" size={20} />
                        <span>{names.length} liiget</span>
                      </div>
                      
                      {googleSheetUrl && (
                        <div className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${isSyncing ? 'bg-blue-100 text-blue-700' : 'bg-emerald-50 text-emerald-700'}`}>
                          {isSyncing ? (
                            <div className="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                          ) : (
                            <Icon name="Check" size={18} />
                          )}
                          {isSyncing ? 'Salvestan tabelisse...' : 'Tabel sünkroniseeritud'}
                        </div>
                      )}

                      <button onClick={() => setIsEditMode(!isEditMode)} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${isEditMode ? 'bg-rose-100 text-rose-700 hover:bg-rose-200' : 'bg-slate-800 text-white hover:bg-slate-700'}`}>
                        <Icon name={isEditMode ? 'X' : 'Settings'} size={20} />
                        {isEditMode ? 'Sulge muutmine' : 'Muuda andmeid'}
                      </button>
                    </div>
                  </div>
                  
                  {!isEditMode && (
                    <div className="mt-6 text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200 flex items-start gap-3">
                      <div className="bg-emerald-100 p-2 rounded-full text-emerald-600 flex-shrink-0 mt-0.5">
                         <Icon name="Check" size={16} strokeWidth={3} />
                      </div>
                      <p>
                        <strong>Kuidas kasutada:</strong> Klõpsa tabeli lahtritel enda nime real, et märkida kellaajad, mis sulle sobivad. 
                        Sinu valikud <strong>salvestuvad automaatselt</strong> ja on teistele koheselt nähtavad. Allservas näed, milline aeg sobib grupile kõige paremini.
                      </p>
                    </div>
                  )}
                </div>

                {isEditMode && (
                  <div className="bg-white rounded-2xl shadow-sm border-2 border-slate-800 p-6 sm:p-8">
                    <h2 className="text-xl font-bold text-slate-800 mb-6 border-b pb-2">Seaded / Andmete muutmine</h2>
                    
                    <div className="mb-8 p-4 bg-blue-50 border border-blue-200 rounded-xl space-y-3">
                      <h3 className="font-semibold text-blue-800 flex items-center gap-2">Google Sheets integratsioon</h3>
                      <p className="text-sm text-blue-700">See on sinu Google Sheetsi faili link. Kui soovid siia seotud tabelit muuta, saad lingi allpool asendada.</p>
                      <input 
                        type="text" 
                        value={googleSheetUrl} 
                        onChange={(e) => saveUrl(e.target.value)} 
                        placeholder="https://script.google.com/macros/s/.../exec" 
                        className="w-full px-3 py-2 bg-white border border-blue-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm font-mono text-slate-500" 
                      />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div className="space-y-4">
                        <h3 className="font-semibold text-slate-700 flex items-center gap-2"><Icon name="Users" size={18} /> Osalejad</h3>
                        <div className="flex gap-2">
                          <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addName()} placeholder="Uue osaleja nimi..." className="flex-1 px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400" />
                          <button onClick={addName} className="bg-slate-800 text-white p-2 rounded-lg hover:bg-slate-700"><Icon name="Plus" size={20} /></button>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-2 max-h-64 overflow-y-auto space-y-1">
                          {names.length === 0 && <p className="text-sm text-slate-500 p-2">Osalejaid pole lisatud.</p>}
                          {names.map(name => (
                            <div key={name} className="flex justify-between items-center bg-white border border-slate-200 p-2 rounded shadow-sm">
                              <span className="text-sm font-medium">{name}</span>
                              <button onClick={() => removeName(name)} className="text-rose-500 hover:bg-rose-50 p-1 rounded"><Icon name="Trash2" size={16} /></button>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="space-y-4">
                        <h3 className="font-semibold text-slate-700 flex items-center gap-2"><Icon name="CalendarDays" size={18} /> Kuupäevad ja ajad</h3>
                        <div className="flex gap-2">
                          <input 
                            type="date" 
                            value={newDate} 
                            onChange={(e) => setNewDate(e.target.value)} 
                            onKeyDown={(e) => e.key === 'Enter' && addDate()} 
                            className="flex-1 px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-400" 
                          />
                          <button onClick={addDate} className="bg-slate-800 text-white p-2 rounded-lg hover:bg-slate-700"><Icon name="Plus" size={20} /></button>
                        </div>
                        <div className="space-y-3">
                          {dates.length === 0 && <p className="text-sm text-slate-500 p-2 border border-dashed rounded-lg">Kuupäevi pole lisatud.</p>}
                          {dates.map((d, index) => {
                            const theme = THEMES[index % THEMES.length];
                            return (
                              <div key={d.id} className={`border rounded-lg overflow-hidden`}>
                                <div className={`flex justify-between items-center p-3 ${theme.header}`}>
                                  <div className="relative flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" title="Muuda kuupäeva">
                                    <input type="date" onChange={(e) => updateDate(d.id, e.target.value)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                    <span className="font-semibold">{d.label}</span>
                                    <Icon name="Edit" size={16} className="opacity-60" />
                                  </div>
                                  <button onClick={() => removeDate(d.id)} className="text-slate-700 hover:text-rose-600 hover:bg-white/50 p-1 rounded"><Icon name="Trash2" size={18} /></button>
                                </div>
                                <div className="p-3 bg-white space-y-2">
                                  <div className="flex flex-wrap gap-2">
                                    {d.times.map(t => (
                                      <div key={t} className={`flex items-center gap-1 text-sm border px-2 py-1 rounded-md ${theme.subHeader}`}>
                                        <div className="relative flex items-center gap-1 cursor-pointer hover:opacity-80" title="Muuda kellaaega">
                                          <input type="time" value={t} onChange={(e) => updateTime(d.id, t, e.target.value)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                          <span>{t}</span>
                                          <Icon name="Edit" size={14} className="opacity-50" />
                                        </div>
                                        <button onClick={() => removeTime(d.id, t)} className="text-slate-500 hover:text-rose-500 ml-1"><Icon name="X" size={14} /></button>
                                      </div>
                                    ))}
                                    {d.times.length === 0 && <span className="text-xs text-slate-400 italic">Kellaaegu pole</span>}
                                  </div>
                                  <div className="flex gap-2 mt-2 pt-2 border-t border-slate-100">
                                    <input 
                                      type="time" 
                                      value={newTimes[d.id] || ""} 
                                      onChange={(e) => setNewTimes({...newTimes, [d.id]: e.target.value})} 
                                      onKeyDown={(e) => e.key === 'Enter' && addTime(d.id)} 
                                      className="text-sm flex-1 px-2 py-1 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-slate-400" 
                                    />
                                    <button onClick={() => addTime(d.id)} className="bg-slate-200 text-slate-700 px-2 rounded hover:bg-slate-300 text-sm font-medium">Lisa</button>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-opacity ${isEditMode ? 'opacity-50 pointer-events-none' : ''}`}>
                  <div className="overflow-x-auto">
                    {dates.length === 0 || dates.every(d => d.times.length === 0) ? (
                      <div className="p-12 text-center text-slate-500">
                        <Icon name="CalendarDays" size={48} className="mx-auto mb-4 opacity-20" />
                        <p>Tabel on tühi. Palun lisa "Muuda andmeid" nupu alt kuupäevi ja kellaaegu.</p>
                      </div>
                    ) : (
                      <table className="min-w-full border-collapse text-sm">
                        <thead>
                          <tr>
                            <th className="sticky left-0 z-20 bg-white border-b border-r border-slate-200 p-4 min-w-[180px] shadow-[1px_0_0_0_#e2e8f0]"></th>
                            {dates.map((d, i) => {
                              if (d.times.length === 0) return null;
                              return <th key={d.id} colSpan={d.times.length} className={`border-b border-r p-3 text-center font-bold text-base ${THEMES[i % THEMES.length].header}`}>{d.label}</th>;
                            })}
                          </tr>
                          <tr>
                            <th className="sticky left-0 z-20 bg-slate-50 border-b border-r border-slate-200 p-3 text-left font-bold text-slate-700 shadow-[1px_0_0_0_#e2e8f0]">Osaleja Nimi</th>
                            {dates.map((d, i) => {
                              if (d.times.length === 0) return null;
                              return d.times.map(t => <th key={`${d.id}_${t}`} className={`border-b border-r border-slate-200/50 p-3 text-center font-semibold ${THEMES[i % THEMES.length].subHeader} min-w-[80px]`}>{t}</th>);
                            })}
                          </tr>
                        </thead>
                        <tbody>
                          {names.map((name) => (
                            <tr key={name} className="group hover:bg-slate-50 transition-colors">
                              <td className="sticky left-0 z-10 bg-white group-hover:bg-slate-50 border-b border-r border-slate-200 p-3 font-medium text-slate-800 shadow-[1px_0_0_0_#e2e8f0]">{name}</td>
                              {dates.map((d, i) => {
                                if (d.times.length === 0) return null;
                                const theme = THEMES[i % THEMES.length];
                                return d.times.map(t => {
                                  const selKey = `${name}@@${d.label}@@${t}`;
                                  const isSelected = selections[selKey];
                                  return (
                                    <td key={selKey} onClick={() => toggleSelection(name, d.label, t)} className={`border-b border-r border-slate-200 p-0 cursor-pointer transition-all duration-150 ${isSelected ? theme.cellSelected : `bg-transparent ${theme.cellHover}`}`}>
                                      <div className="flex items-center justify-center h-12 w-full">
                                        {isSelected && <Icon name="Check" size={24} strokeWidth={3} />}
                                      </div>
                                    </td>
                                  );
                                });
                              })}
                            </tr>
                          ))}
                        </tbody>
                        {names.length > 0 && (
                          <tfoot>
                            <tr className="bg-slate-100">
                              <td className="sticky left-0 z-20 bg-slate-100 border-t-4 border-slate-300 border-r border-slate-200 p-4 font-bold text-slate-800 text-right shadow-[1px_0_0_0_#e2e8f0]">KOKKU SOBIB:</td>
                              {dates.map((d, i) => {
                                if (d.times.length === 0) return null;
                                const theme = THEMES[i % THEMES.length];
                                return d.times.map(t => {
                                  const key = `${d.label}@@${t}`;
                                  const total = totals[key] || 0;
                                  const isBestTime = total > 0 && total === maxTotal;
                                  return (
                                    <td key={key} className={`border-t-4 border-r border-slate-300 p-3 text-center font-bold text-lg transition-colors ${isBestTime ? theme.bestTime : 'text-slate-600'}`}>
                                      {total}
                                      {isBestTime && <div className="text-[10px] font-normal uppercase tracking-wider opacity-90 mt-1">Parim aeg</div>}
                                    </td>
                                  );
                                });
                              })}
                            </tr>
                          </tfoot>
                        )}
                      </table>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
